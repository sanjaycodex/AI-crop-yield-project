<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivasayi AI | Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="topbar">
    <h1 class="logo">Vivasayi AI</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="form.html">Input Form</a>
      <a href="results.html" class="active">Results</a>
    </nav>
  </header>

  <main class="page reveal">
    <section class="card">
      <h2>Prediction Results</h2>
      <p class="subtitle">Live output generated from your latest farm input.</p>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Running prediction model...</p>
      </div>

      <div id="errorBox" class="error hidden"></div>

      <div id="resultContent" class="hidden">
        <div class="results-grid">
          <article class="result-card">
            <h3>Predicted Yield</h3>
            <p id="yieldValue" class="metric">-</p>
          </article>
          <article class="result-card">
            <h3>Estimated Market Price</h3>
            <p id="priceValue" class="metric">-</p>
          </article>
          <article class="result-card">
            <h3>Total Expected Profit</h3>
            <p id="profitValue" class="metric">-</p>
          </article>
        </div>

        <section class="card compact">
          <h3>Recommended Top 3 Crops</h3>
          <ul id="recommendList" class="recommend-list"></ul>
        </section>

        <section class="card compact">
          <h3>Profit Comparison Chart</h3>
          <canvas id="comparisonChart" width="820" height="320"></canvas>
        </section>
      </div>

      <section class="card compact">
        <h3>Previous Predictions</h3>
        <ul id="historyList" class="history-list"></ul>
      </section>
    </section>
  </main>

  <script src="js/results.js"></script>
</body>
</html>

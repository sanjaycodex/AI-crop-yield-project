<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivasayi AI | Input Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="topbar">
    <h1 class="logo">Vivasayi AI</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="form.html" class="active">Input Form</a>
      <a href="results.html">Results</a>
    </nav>
  </header>

  <main class="page reveal">
    <section class="card form-card">
      <h2>Farm Input Form</h2>
      <p class="subtitle">Enter your farm data to generate yield and profit insights.</p>

      <div id="errorBox" class="error hidden"></div>

      <form id="farmForm" novalidate>
        <div class="form-grid">
          <label>Soil Type
            <select name="soilType" required>
              <option value="">Select</option>
              <option value="sandy">Sandy</option>
              <option value="clay">Clay</option>
              <option value="loamy">Loamy</option>
            </select>
          </label>

          <label>Soil pH
            <input type="number" name="soilPH" step="0.1" min="0" max="14" required />
          </label>

          <label>Nitrogen (N)
            <input type="number" name="nitrogen" min="0" required />
          </label>

          <label>Phosphorus (P)
            <input type="number" name="phosphorus" min="0" required />
          </label>

          <label>Potassium (K)
            <input type="number" name="potassium" min="0" required />
          </label>

          <label>Temperature (°C)
            <input type="number" name="temperature" step="0.1" required />
          </label>

          <label>Rainfall (mm)
            <input type="number" name="rainfall" step="0.1" min="0" required />
          </label>

          <label>Location
            <input type="text" name="location" minlength="2" required />
          </label>

          <label>Season
            <select name="season" required>
              <option value="">Select</option>
              <option value="kharif">Kharif</option>
              <option value="rabi">Rabi</option>
              <option value="summer">Summer</option>
              <option value="winter">Winter</option>
              <option value="monsoon">Monsoon</option>
              <option value="spring">Spring</option>
            </select>
          </label>

          <label>Primary Crop (optional)
            <select name="crop">
              <option value="Rice">Rice</option>
              <option value="Wheat">Wheat</option>
              <option value="Cotton">Cotton</option>
              <option value="Maize">Maize</option>
              <option value="Millet">Millet</option>
              <option value="Sugarcane">Sugarcane</option>
            </select>
          </label>
        </div>

        <div class="weather-inline">
          <label>OpenWeather API Key (optional)
            <input type="text" id="weatherApiKey" placeholder="Paste key for live weather autofill" />
          </label>
          <button type="button" id="weatherBtn" class="btn btn-outline">Auto-fill Weather</button>
        </div>

        <button type="submit" class="btn btn-primary">Predict Now</button>
      </form>
    </section>
  </main>

  <script src="js/form.js"></script>
</body>
</html>
